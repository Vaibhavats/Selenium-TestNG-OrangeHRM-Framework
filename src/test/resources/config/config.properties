# ============================================================
# Event Management System - Test Configuration
# ============================================================

# --- Application URLs ---
# --- Application URLs ---
base.url=https://opensource-demo.orangehrmlive.com/
login.url=https://opensource-demo.orangehrmlive.com/
register.url=https://opensource-demo.orangehrmlive.com/
booking.url=https://opensource-demo.orangehrmlive.com/

# --- Browser Configuration ---
# Options: chrome | firefox | edge
browser=chrome

# Headless mode (true/false) — set true for CI pipelines
headless=false

# Implicit wait timeout in seconds
implicit.wait=10

# Explicit wait timeout in seconds
explicit.wait=20

# Page load timeout in seconds
page.load.timeout=30

# --- Screenshot Settings ---
screenshot.path=src/test/resources/screenshots/

# --- Report Settings ---
report.path=test-output/ExtentReport.html
report.title=Event Management System - Test Execution Report
report.name=Automation Test Suite

# --- Test Data Files ---
login.testdata.path=src/test/resources/testdata/LoginTestData.xlsx
registration.testdata.path=src/test/resources/testdata/RegistrationTestData.xlsx
booking.testdata.path=src/test/resources/testdata/BookingTestData.xlsx

# --- Valid Test Credentials (OrangeHRM demo account) ---
valid.username=Admin
valid.password=admin123

# --- Log Settings ---
log.level=INFO
